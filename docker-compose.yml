services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solicitudes-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solicitudes-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
