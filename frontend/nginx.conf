server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Rutas de Angular (SPA): cualquier ruta no encontrada cae a index.html
    # para que el router de Angular la resuelva en el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend dentro de la red de docker-compose (servicio "backend").
    # Así el frontend sigue llamando a /api/... igual que en desarrollo local.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
